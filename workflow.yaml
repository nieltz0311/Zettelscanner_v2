# Lobster workflow definition (loaded by OpenClaw via loadWorkflowFile)
name: kassenzettel-workflow
description: Kassenzettel-OCR-Pipeline - Bild zu Text zu strukturierten Daten zu SQLite

args:
  image_path:
    description: "Pfad zum Kassenzettel-Bild"

steps:
  - id: ocr
    run: >-
      python3 -m agents.run_step agents.ocr_scanner OCRScanner
      --input "{\"image_path\": \"${args.image_path}\"}"
      --arg-key image_path
      --output /tmp/zettelscanner_ocr.json

  - id: parse
    run: >-
      python3 -m agents.run_step agents.data_parser DataParser
      --input-file /tmp/zettelscanner_ocr.json
      --arg-key raw_text
      --output /tmp/zettelscanner_parsed.json

  - id: write_db
    run: >-
      python3 -m agents.run_step agents.database_writer DatabaseWriter
      --input-file /tmp/zettelscanner_parsed.json
