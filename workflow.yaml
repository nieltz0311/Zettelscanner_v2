# workflow.yaml
name: KassenzettelWorkflow

agents:
  - name: OCRScanner
    type: python
    module: agents.ocr_scanner
    class: OCRScanner
    inputs:
      - name: image_path
        type: string
    outputs:
      - name: raw_text
        type: string

  - name: DataParser
    type: python
    module: agents.data_parser
    class: DataParser
    inputs:
      - name: raw_text
        type: string
    outputs:
      - name: parsed_data
        type: dict

  - name: DatabaseWriter
    type: python
    module: agents.database_writer
    class: DatabaseWriter
    inputs:
      - name: parsed_data
        type: dict
    outputs:
      - name: status
        type: dict

workflow:
  - step: OCRScanner
    next: DataParser
    input_mapping:
      image_path: image_path
    output_mapping:
      raw_text: raw_text

  - step: DataParser
    next: DatabaseWriter
    input_mapping:
      raw_text: raw_text
    output_mapping:
      parsed_data: parsed_data

  - step: DatabaseWriter
    input_mapping:
      parsed_data: parsed_data